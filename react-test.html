<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YYC³ React 测试</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
        background: linear-gradient(135deg, #060e1f 0%, #0a1628 30%, #081430 60%, #040c1a 100%);
        color: #ffffff;
        margin: 0;
        padding: 20px;
        min-height: 100vh;
      }
      .container {
        max-width: 1200px;
        width: 100%;
        background: rgba(6, 14, 31, 0.8);
        border: 1px solid rgba(0, 212, 255, 0.2);
        border-radius: 8px;
        padding: 30px;
        margin: 0 auto;
      }
      h1 {
        color: #00d4ff;
        margin-bottom: 20px;
        text-align: center;
      }
      .test-section {
        margin: 20px 0;
        padding: 15px;
        border-radius: 4px;
        background: rgba(0, 212, 255, 0.05);
        border-left: 3px solid #00d4ff;
      }
      .success {
        color: #00ff88;
      }
      .error {
        color: #ff4444;
      }
      .info {
        color: #00d4ff;
      }
      button {
        background: #00d4ff;
        color: #060e1f;
        border: none;
        padding: 12px 24px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
        margin: 10px;
        transition: all 0.3s ease;
      }
      button:hover {
        background: #00b8e6;
        transform: translateY(-2px);
      }
      .sidebar {
        width: 200px;
        background: rgba(6, 14, 31, 0.95);
        border-right: 1px solid rgba(0, 180, 255, 0.08);
        padding: 10px;
        border-radius: 4px;
      }
      .sidebar-item {
        padding: 10px;
        margin: 5px 0;
        background: rgba(0, 212, 255, 0.05);
        border-radius: 4px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .sidebar-item:hover {
        background: rgba(0, 212, 255, 0.1);
      }
      .sidebar-item.active {
        background: rgba(0, 212, 255, 0.15);
        color: #00d4ff;
      }
      .main-content {
        flex: 1;
        padding: 20px;
        background: rgba(6, 14, 31, 0.8);
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    
    <script>
      // 测试 React 基本功能
      const { useState, useEffect } = React;
      const { createRoot } = ReactDOM;

      function App() {
        const [count, setCount] = useState(0);
        const [activeTab, setActiveTab] = useState('home');
        const [sidebarCollapsed, setSidebarCollapsed] = useState(false);

        const sidebarItems = [
          { id: 'home', label: '数据监控', icon: '📊' },
          { id: 'follow-up', label: '跟进面板', icon: '📋' },
          { id: 'patrol', label: '巡逻系统', icon: '🔍' },
          { id: 'operations', label: '运维中心', icon: '⚙️' },
          { id: 'ai', label: 'AI 助手', icon: '🤖' },
          { id: 'settings', label: '系统设置', icon: '🔧' },
        ];

        return React.createElement('div', { className: 'container' },
          React.createElement('h1', null, 'YYC³ React 功能测试'),
          
          React.createElement('div', { className: 'test-section info' },
            React.createElement('strong', null, 'React 状态: '),
            React.createElement('span', { style: { color: '#00ff88' } }, '✅ 正常工作')
          ),
          
          React.createElement('div', { className: 'test-section info' },
            React.createElement('strong', null, '计数器测试: '),
            React.createElement('span', null, count),
            React.createElement('button', { 
              onClick: () => setCount(count + 1),
              style: { marginLeft: '10px' }
            }, '+'),
            React.createElement('button', { 
              onClick: () => setCount(count - 1),
              style: { marginLeft: '10px' }
            }, '-')
          ),
          
          React.createElement('div', { className: 'test-section info' },
            React.createElement('strong', null, '状态管理测试: '),
            React.createElement('span', null, `当前标签: ${activeTab}, 侧边栏: ${sidebarCollapsed ? '折叠' : '展开'}`)
          ),
          
          React.createElement('div', { style: { display: 'flex', gap: '20px', marginTop: '20px' } },
            React.createElement('div', { className: 'sidebar' },
              ...sidebarItems.map(item => 
                React.createElement('div', {
                  key: item.id,
                  className: `sidebar-item ${activeTab === item.id ? 'active' : ''}`,
                  onClick: () => setActiveTab(item.id)
                }, `${item.icon} ${item.label}`)
              )
            ),
            
            React.createElement('div', { className: 'main-content' },
              React.createElement('h2', null, '主内容区域'),
              React.createElement('p', null, `当前选中的标签: ${activeTab}`),
              React.createElement('p', null, 'React 状态管理、组件渲染、事件处理都正常工作'),
              React.createElement('button', {
                onClick: () => setSidebarCollapsed(!sidebarCollapsed),
                style: { marginTop: '20px' }
              }, sidebarCollapsed ? '展开侧边栏' : '折叠侧边栏')
            )
          )
        );
      }

      // 挂载 React 应用
      const root = createRoot(document.getElementById('root'));
      root.render(React.createElement(App));
      
      console.log('React 应用已成功挂载');
    </script>
  </body>
</html>
