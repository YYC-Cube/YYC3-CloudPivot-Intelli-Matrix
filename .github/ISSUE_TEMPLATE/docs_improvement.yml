---
name: 📝 文档改进
description: 提出文档改进建议
title: "[Docs] 简短描述"
labels: ["documentation", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        感谢您帮助改进文档！
        
  - type: textarea
    id: current-state
    attributes:
      label: 当前状态
      description: 描述当前文档的问题
      placeholder: 文档缺少... / 文档不清晰...
    validations:
      required: true
      
  - type: textarea
    id: suggested-improvement
    attributes:
      label: 建议的改进
      description: 您建议如何改进
      placeholder: 我建议添加...
    validations:
      required: true
      
  - type: input
    id: page-url
    attributes:
      label: 相关页面
      description: 涉及的文档页面 URL
      placeholder: https://...
    validations:
      required: false
      
  - type: checkboxes
    id: terms
    attributes:
      label: 行为准则
      description: 您是否同意遵守行为准则？
      options:
        - label: 我已阅读并同意遵守 [行为准则](CODE_OF_CONDUCT.md)
          required: true
