---
name: 🐛 Bug 报告
description: 报告一个 Bug 帮助我们改进
title: "[Bug] 简短描述"
labels: ["bug", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        感谢您花时间填写此 Bug 报告！
        
  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 请清晰简洁地描述这个 Bug
      placeholder: 当...时，发生...
    validations:
      required: true
      
  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤
      description: 详细的复现步骤
      placeholder: |
        1. 进入 '...'
        2. 点击 '....'
        3. 滚动到 '....'
        4. 发现错误
    validations:
      required: true
      
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      description: 你期望发生什么
      placeholder: 预期应该...
    validations:
      required: true
      
  - type: textarea
    id: screenshots
    attributes:
      label: 截图
      description: 如有需要，添加截图
      placeholder: 拖拽截图到此处
      
  - type: dropdown
    id: browsers
    attributes:
      label: 浏览器
      description: 你使用什么浏览器
      multiple: true
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other
    validations:
      required: true
      
  - type: input
    id: os
    attributes:
      label: 操作系统
      description: 你的操作系统
      placeholder: macOS 14.0 / Windows 11 / Ubuntu 22.04
    validations:
      required: true
      
  - type: input
    id: version
    attributes:
      label: 版本号
      description: 项目版本
      placeholder: v0.0.1
    validations:
      required: true
      
  - type: textarea
    id: logs
    attributes:
      label: 日志
      description: 复制并粘贴任何相关的错误日志
      render: shell
      
  - type: checkboxes
    id: terms
    attributes:
      label: 行为准则
      description: 您是否同意遵守行为准则？
      options:
        - label: 我已阅读并同意遵守 [行为准则](CODE_OF_CONDUCT.md)
          required: true
          
  - type: checkboxes
    id: duplicate
    attributes:
      label: 重复检查
      description: 您是否已检查过这不是重复的问题？
      options:
        - label: 我已检查过这不是重复的问题
          required: true
