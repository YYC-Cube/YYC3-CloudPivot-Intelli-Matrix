# PR Labeler Configuration
# Automatically labels pull requests based on changed files

# Documentation changes
docs:
  - changed-files:
      - any: ['docs/**', '*.md']

# Dependencies
dependencies:
  - changed-files:
      - any: ['package.json', 'pnpm-lock.yaml']

# CI/CD
ci:
  - changed-files:
      - any: ['.github/**', '*.yml', '*.yaml']

# Build configuration
build:
  - changed-files:
      - any: ['vite.config.ts', 'tsconfig*.json', 'Dockerfile*', 'docker-compose*.yml']

# Testing
testing:
  - changed-files:
      - any: ['src/app/__tests__/**', '**/*.test.ts', '**/*.test.tsx']

# Type definitions
types:
  - changed-files:
      - any: ['src/app/types/**', '**/*.d.ts']

# Components
components:
  - changed-files:
      - any: ['src/app/components/**']

# Hooks
hooks:
  - changed-files:
      - any: ['src/app/hooks/**']

# AI/ML features
ai:
  - changed-files:
      - any: ['src/app/components/AI*.tsx', 'src/app/components/SDK*.tsx', 'src/app/hooks/useAI*.ts*']

# Styling
style:
  - changed-files:
      - any: ['src/**/*.css', 'tailwind.config.*']

# Configuration
config:
  - changed-files:
      - any: ['src/app/lib/**', 'src/app/i18n/**']

# Security
security:
  - changed-files:
      - any: ['src/app/lib/authContext.tsx', 'src/app/lib/supabaseClient.ts']

# Performance
performance:
  - changed-files:
      - any: ['vite.config.ts', 'src/app/lib/performance.*']
