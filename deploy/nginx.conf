# ============================================================
# YYC³ CloudPivot Intelli-Matrix — Nginx 配置
# ============================================================
# 项目路径: /Users/yanyu/Cloudpivotintellimatrix
# 部署地址: http://192.168.3.x:3118
# Ollama:   http://127.0.0.1:11434
# 日志目录: /Volumes/Cache/nginx-logs/
# ============================================================

server {
    listen       3118;
    server_name  _;

    # ── 静态文件根目录 (pnpm build 产物) ──
    root /Users/yanyu/Cloudpivotintellimatrix/dist;
    index index.html;

    # ── 日志 → Cache 盘 ──
    access_log /Volumes/Cache/nginx-logs/yyc3-access.log;
    error_log  /Volumes/Cache/nginx-logs/yyc3-error.log;

    # ── Gzip 压缩 ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/manifest+json
        image/svg+xml;

    # ── Ollama 反向代理 ──
    # /api/v1/llm/ollama/* → http://127.0.0.1:11434/api/*
    location /api/v1/llm/ollama/ {
        proxy_pass http://127.0.0.1:11434/api/;
        proxy_http_version 1.1;

        # SSE 流式响应支持 (大模型推理必须)
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        # 超时 (671b 大模型推理可能很慢)
        proxy_connect_timeout 10s;
        proxy_read_timeout 600s;
        proxy_send_timeout 60s;

        # CORS
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Content-Type, Authorization, Api-Key' always;

        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
            add_header Access-Control-Allow-Headers 'Content-Type, Authorization, Api-Key';
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            return 204;
        }
    }

    # ── 带 hash 的静态资源 → 长缓存 1 年 ──
    location ~* \.[a-f0-9]{8,}\.(js|css|png|jpg|jpeg|gif|svg|woff2?|ttf|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── 其他静态资源 → 短缓存 ──
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff2?|ttf|ico|json|webmanifest)$ {
        expires 1h;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── SPA 回退 (React Router) ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── 安全头 ──
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
}
